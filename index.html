<!-- Agenda ALLHANDMADE — login por roles, calendario y actividades, datos en Supabase -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ALLHANDMADE · Agenda</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --ink:#0a0a0a;
    --panel:#161616;
    --panel2:#1c1c1c;
    --line:#2e2e2e;
    --cream:#f2f2f2;
    --muted:#8a8a8a;
    --gold:#ffffff;
    --gold-2:#ffffff;
    --red:#ffffff;
    --green:#cccccc;
    --shadow:0 18px 50px rgba(0,0,0,.7);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:
      radial-gradient(1200px 500px at 80% -10%, rgba(255,255,255,.06), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(255,255,255,.04), transparent 60%),
      var(--ink);
    color:var(--cream);
    font-family:"Oswald",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .stripes{position:fixed;inset:0 0 auto 0;height:6px;background:repeating-linear-gradient(45deg,#000 0 14px,#fff 14px 28px);opacity:.95;z-index:50}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit}
  .hidden{display:none!important}

  /* ---------- LOGIN ---------- */
  .login-wrap{min-height:100vh;display:grid;place-items:center;padding:28px}
  .card{
    width:100%;max-width:420px;background:linear-gradient(180deg,var(--panel),var(--panel2));
    border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);
    padding:38px 32px 34px;position:relative;overflow:hidden
  }
  .card::before{content:"";position:absolute;inset:0;background:radial-gradient(400px 160px at 50% -40px,rgba(255,255,255,.10),transparent 70%);pointer-events:none}
  .brand{text-align:center;margin-bottom:26px}
  .brand .pole{font-size:34px;letter-spacing:.5px}
  .brand h1{font-family:"Bebas Neue",sans-serif;font-size:42px;letter-spacing:4px;margin:6px 0 2px;color:var(--gold-2)}
  .brand p{margin:0;color:var(--muted);font-weight:300;letter-spacing:3px;text-transform:uppercase;font-size:12px}
  label{display:block;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin:16px 0 6px}
  .field{width:100%;padding:13px 14px;background:#0e0e0e;border:1px solid var(--line);border-radius:10px;color:var(--cream);font-size:16px;outline:none;transition:.15s}
  .field:focus{border-color:#ffffff;box-shadow:0 0 0 3px rgba(255,255,255,.15)}
  .btn{width:100%;margin-top:22px;padding:14px;border:none;border-radius:10px;background:#ffffff;color:#000;font-size:16px;font-weight:600;letter-spacing:2px;text-transform:uppercase;transition:.15s}
  .btn:hover{background:#e6e6e6}
  .btn:active{transform:translateY(1px)}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--cream)}
  .btn.danger{background:transparent;border:1px solid #555;color:#ddd}
  .btn.sm{width:auto;margin:0;padding:8px 14px;font-size:12px}
  .error{color:#dcdcdc;font-style:italic;font-size:13px;margin-top:12px;min-height:18px;text-align:center;letter-spacing:.5px}

  /* ---------- APP ---------- */
  .topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:16px;padding:16px 22px;background:rgba(10,10,10,.86);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  .topbar .logo{font-family:"Bebas Neue",sans-serif;font-size:26px;letter-spacing:2px;color:var(--gold-2)}
  .who{margin-left:auto;text-align:right;line-height:1.2}
  .who .name{font-weight:500}
  .who .role{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#fff}
  .container{max-width:1080px;margin:0 auto;padding:24px 20px 80px}

  .toolbar{display:flex;flex-wrap:wrap;align-items:center;gap:12px;margin-bottom:18px}
  .month-nav{display:flex;align-items:center;gap:10px}
  .month-nav h2{font-family:"Cormorant Garamond",serif;font-size:30px;margin:0;min-width:240px;text-align:center;text-transform:capitalize;color:var(--cream)}
  .iconbtn{width:40px;height:40px;border-radius:10px;border:1px solid var(--line);background:var(--panel);color:var(--cream);font-size:18px}
  .iconbtn:hover{border-color:#fff}
  .spacer{flex:1}
  .select{padding:10px 12px;background:var(--panel);border:1px solid var(--line);border-radius:10px;color:var(--cream);font-size:14px}

  .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
  .dow{text-align:center;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:4px 0}
  .day{min-height:104px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:8px;position:relative;text-align:left;color:var(--cream);transition:.12s;display:flex;flex-direction:column;gap:5px}
  .day:hover{border-color:#fff;transform:translateY(-2px)}
  .day.empty{background:transparent;border:1px dashed #232323;pointer-events:none}
  .day.today{box-shadow:inset 0 0 0 2px #fff}
  .day .num{font-weight:600;font-size:15px}
  .day.today .num{color:#fff}
  .pills{display:flex;flex-direction:column;gap:4px;overflow:hidden}
  .pill{font-size:11px;line-height:1.25;padding:3px 6px;border-radius:6px;background:#232323;border-left:3px solid #ffffff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pill.done{opacity:.5;border-left-color:#666;text-decoration:line-through}
  .more{font-size:10.5px;color:var(--muted)}
  .count{position:absolute;top:8px;right:8px;font-size:10px;background:#ffffff;color:#000;border-radius:20px;padding:1px 7px;font-weight:700}

  /* ---------- MODAL ---------- */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(4px);display:grid;place-items:center;padding:20px;z-index:40}
  .modal{width:100%;max-width:520px;max-height:88vh;overflow:auto;background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:24px}
  .modal h3{font-family:"Cormorant Garamond",serif;font-size:26px;margin:0 0 2px}
  .modal .sub{color:var(--muted);font-size:13px;margin-bottom:18px;letter-spacing:.5px}
  .task{display:flex;align-items:flex-start;gap:10px;padding:11px 12px;border:1px solid var(--line);border-radius:11px;margin-bottom:9px;background:#131313}
  .task .chk{margin-top:3px;width:20px;height:20px;border-radius:6px;border:1px solid #ffffff;background:transparent;color:#fff;font-size:14px;line-height:1;display:grid;place-items:center;flex:0 0 auto}
  .task.done .chk{background:#ffffff;border-color:#ffffff;color:#000}
  .task .body{flex:1;min-width:0}
  .task .t-title{font-size:15px;font-weight:500}
  .task.done .t-title{text-decoration:line-through;color:var(--muted)}
  .task .t-meta{font-size:12px;color:#ffffff;margin-top:1px}
  .task .t-notes{font-size:12.5px;color:var(--muted);margin-top:3px;white-space:pre-wrap}
  .task .del{background:none;border:none;color:#777;font-size:16px;flex:0 0 auto}
  .task .del:hover{color:#fff}
  .task.locked{background:#0e0e0e;border-style:dashed}
  .task .lock{flex:0 0 auto;color:var(--muted);font-size:13px;margin-top:3px}
  .assigned-by{display:inline-block;font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:2px 8px;border-radius:20px;border:1px solid #ffffff;color:#ffffff;margin-left:6px;vertical-align:middle}
  .empty-msg{color:var(--muted);font-size:14px;text-align:center;padding:18px 0;font-weight:300}
  .row{display:flex;gap:10px}
  .row > *{flex:1}
  .addbox{border-top:1px dashed var(--line);margin-top:14px;padding-top:16px}
  .modal-actions{display:flex;gap:10px;margin-top:8px}

  /* ---------- USER MANAGEMENT ---------- */
  .users-table{width:100%;border-collapse:collapse;margin-top:6px}
  .users-table th{text-align:left;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);padding:8px 6px;border-bottom:1px solid var(--line)}
  .users-table td{padding:10px 6px;border-bottom:1px solid #222;font-size:14px;vertical-align:middle}
  .tag{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;padding:3px 9px;border-radius:20px;border:1px solid var(--line)}
  .tag.dueno{color:#ffffff;border-color:#ffffff}
  .tag.admin{color:#cccccc;border-color:#666}
  .tag.barbero{color:var(--cream)}

  /* ---------- CONFIG WARNING ---------- */
  .config-warn{max-width:640px;margin:60px auto;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:24px;line-height:1.6}
  .config-warn h2{font-family:"Cormorant Garamond",serif;margin:0 0 10px;font-size:24px}
  .config-warn code{background:#000;padding:2px 6px;border-radius:4px;font-size:13px}

  @media (max-width:640px){
    .day{min-height:74px;padding:6px}
    .pill .pill-time{display:none}
    .month-nav h2{font-size:22px;min-width:150px}
    .topbar .logo{font-size:20px}
  }
</style>

<div class="stripes"></div>

<!-- ============ CONFIG WARNING ============ -->
<div id="configWarn" class="config-warn hidden">
  <h2>Falta configurar Supabase</h2>
  <p>Edita el archivo HTML y reemplaza <code>SUPABASE_URL</code> y <code>SUPABASE_ANON_KEY</code> con los datos de tu proyecto de Supabase (Settings → API).</p>
</div>

<!-- ============ LOGIN ============ -->
<div id="loginView" class="login-wrap hidden">
  <div class="card">
    <div class="brand">
      <div class="pole">💈</div>
      <h1>ALLHANDMADE</h1>
      <p>Agenda de la barbería</p>
    </div>
    <label for="u">Usuario</label>
    <input id="u" class="field" autocomplete="username" placeholder="tu usuario">
    <label for="p">Contraseña</label>
    <input id="p" class="field" type="password" autocomplete="current-password" placeholder="••••••••">
    <button class="btn" onclick="doLogin()">Entrar</button>
    <div id="loginError" class="error"></div>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="appView" class="hidden">
  <div class="topbar">
    <div class="logo">💈 ALLHANDMADE</div>
    <div class="who">
      <div class="name" id="waName"></div>
      <div class="role" id="waRole"></div>
    </div>
    <button class="btn ghost sm hidden" id="manageBtn" onclick="openUsers()">Usuarios</button>
    <button class="btn ghost sm" onclick="logout()">Salir</button>
  </div>

  <div class="container">
    <div class="toolbar">
      <div class="month-nav">
        <button class="iconbtn" onclick="changeMonth(-1)">‹</button>
        <h2 id="monthLabel"></h2>
        <button class="iconbtn" onclick="changeMonth(1)">›</button>
      </div>
      <button class="btn ghost sm" onclick="goToday()">Hoy</button>
      <div class="spacer"></div>
      <select id="barberFilter" class="select hidden" onchange="render()"></select>
    </div>

    <div class="grid" id="dow"></div>
    <div class="grid" id="calendar" style="margin-top:8px"></div>
  </div>
</div>

<!-- ============ DAY MODAL ============ -->
<div id="dayModal" class="overlay hidden">
  <div class="modal">
    <h3 id="dayTitle"></h3>
    <div class="sub" id="dayOwner"></div>
    <div id="taskList"></div>
    <div class="addbox" id="addBox">
      <label id="addLabel">Nueva actividad</label>
      <input id="ntTitle" class="field" placeholder="¿Qué hay que hacer?">
      <div class="row" style="margin-top:10px">
        <div>
          <label>Hora (opcional)</label>
          <input id="ntTime" class="field" type="time">
        </div>
      </div>
      <label style="margin-top:10px">Notas (opcional)</label>
      <textarea id="ntNotes" class="field" rows="2" placeholder="Detalles, cliente, etc."></textarea>
      <button class="btn" onclick="addTask()">Agregar actividad</button>
    </div>
    <div class="modal-actions">
      <button class="btn ghost" onclick="closeModal('dayModal')">Cerrar</button>
    </div>
  </div>
</div>

<!-- ============ USERS MODAL ============ -->
<div id="usersModal" class="overlay hidden">
  <div class="modal">
    <h3>Usuarios y contraseñas</h3>
    <div class="sub">Solo el dueño puede gestionar cuentas.</div>
    <table class="users-table">
      <thead><tr><th>Nombre</th><th>Usuario</th><th>Rol</th><th></th></tr></thead>
      <tbody id="usersBody"></tbody>
    </table>
    <div class="addbox">
      <label>Agregar persona</label>
      <input id="nuName" class="field" placeholder="Nombre (ej. Carlos)">
      <div class="row" style="margin-top:10px">
        <div><label>Usuario</label><input id="nuUser" class="field" placeholder="usuario"></div>
        <div><label>Contraseña</label><input id="nuPass" class="field" placeholder="clave"></div>
      </div>
      <label style="margin-top:10px">Rol</label>
      <select id="nuRole" class="select" style="width:100%">
        <option value="barbero">Barbero</option>
        <option value="administradora">Administradora</option>
        <option value="dueno">Dueño</option>
      </select>
      <button class="btn" onclick="addUser()">Crear cuenta</button>
      <div id="userError" class="error"></div>
    </div>
    <div class="modal-actions">
      <button class="btn ghost" onclick="closeModal('usersModal')">Cerrar</button>
    </div>
  </div>
</div>

<script>
/* ============================================================
   CONFIGURACIÓN DE SUPABASE
   Reemplaza estas dos líneas con los valores de tu proyecto:
   Supabase → Project Settings → API → Project URL y anon public key
============================================================ */
const SUPABASE_URL = "https://crulzycdhdeakwdoujpp.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNydWx6eWNkaGRlYWt3ZG91anBwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNjc4MDcsImV4cCI6MjA5NTY0MzgwN30.eOfO6G4iAkbG9-ezeeaA3pBsxEwNDS5eCouqHe0iRbM";

/* ============================================================ */
const ROLE_LABEL = { dueno:"Dueño", administradora:"Administradora", barbero:"Barbero" };
const RANK = { dueno:3, administradora:2, barbero:1 };
const MONTHS = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
const DOW = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];

let sb = null;
let state = {
  user: null,
  users: [],
  activities: [],          // { id, userId, assignedBy, date, time, title, notes, done }
  view: new Date(),
  selectedDate: null
};

/* ============================================================
   CAPA DE DATOS — SUPABASE
============================================================ */
function rowToActivity(r){
  return { id:r.id, userId:r.user_id, assignedBy:r.assigned_by, date:r.date, time:r.time, title:r.title, notes:r.notes, done:!!r.done };
}
function activityToRow(a){
  return { id:a.id, user_id:a.userId, assigned_by:a.assignedBy, date:a.date, time:a.time||null, title:a.title, notes:a.notes||null, done:!!a.done };
}

async function dbLoadUsers(){
  const { data, error } = await sb.from('users').select('*').order('name');
  if(error){ console.error("loadUsers", error); return []; }
  return data || [];
}
async function dbLoadActivities(){
  const { data, error } = await sb.from('activities').select('*');
  if(error){ console.error("loadActivities", error); return []; }
  return (data||[]).map(rowToActivity);
}
async function dbInsertUser(u){
  const { error } = await sb.from('users').insert(u);
  if(error){ alert("Error al crear usuario: " + error.message); throw error; }
}
async function dbDeleteUser(id){
  const { error } = await sb.from('users').delete().eq('id', id);
  if(error) alert("Error al borrar: " + error.message);
}
async function dbUpdateUserPassword(id, password){
  const { error } = await sb.from('users').update({ password }).eq('id', id);
  if(error) alert("Error al cambiar clave: " + error.message);
}
async function dbInsertActivity(a){
  const { error } = await sb.from('activities').insert(activityToRow(a));
  if(error){ alert("Error al guardar: " + error.message); throw error; }
}
async function dbUpdateActivity(a){
  const r = activityToRow(a); delete r.id;
  const { error } = await sb.from('activities').update(r).eq('id', a.id);
  if(error) alert("Error al actualizar: " + error.message);
}
async function dbDeleteActivity(id){
  const { error } = await sb.from('activities').delete().eq('id', id);
  if(error) alert("Error al borrar: " + error.message);
}

/* ============================================================
   ARRANQUE
============================================================ */
async function init(){
  if(!SUPABASE_URL || SUPABASE_URL==="PEGA_AQUI_TU_URL" || !SUPABASE_ANON_KEY || SUPABASE_ANON_KEY==="PEGA_AQUI_TU_ANON_KEY"){
    document.getElementById("configWarn").classList.remove("hidden");
    return;
  }
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  state.users = await dbLoadUsers();
  state.activities = await dbLoadActivities();

  // Tiempo real: cuando alguien cambia algo desde otro dispositivo, se refleja aquí.
  sb.channel('rt-activities')
    .on('postgres_changes', { event:'*', schema:'public', table:'activities' }, async () => {
      state.activities = await dbLoadActivities();
      if(state.user){ if(!document.getElementById("dayModal").classList.contains("hidden")) renderTasks(); render(); }
    }).subscribe();
  sb.channel('rt-users')
    .on('postgres_changes', { event:'*', schema:'public', table:'users' }, async () => {
      state.users = await dbLoadUsers();
      if(state.user){ buildBarberFilter(); if(!document.getElementById("usersModal").classList.contains("hidden")) renderUsers(); }
    }).subscribe();

  document.getElementById("loginView").classList.remove("hidden");
}

/* ============================================================
   LOGIN
============================================================ */
function doLogin(){
  const u = document.getElementById("u").value.trim();
  const p = document.getElementById("p").value;
  const err = document.getElementById("loginError");
  const found = state.users.find(x => x.username.toLowerCase()===u.toLowerCase() && x.password===p);
  if(!found){ err.textContent = "Usuario o contraseña incorrectos."; return; }
  err.textContent = "";
  state.user = found;
  document.getElementById("loginView").classList.add("hidden");
  document.getElementById("appView").classList.remove("hidden");
  document.getElementById("waName").textContent = found.name;
  document.getElementById("waRole").textContent = ROLE_LABEL[found.role];
  // solo el dueño gestiona usuarios
  document.getElementById("manageBtn").classList.toggle("hidden", found.role!=="dueno");
  buildBarberFilter();
  buildDOW();
  goToday();
}
function logout(){
  state.user = null;
  document.getElementById("appView").classList.add("hidden");
  document.getElementById("loginView").classList.remove("hidden");
  document.getElementById("u").value=""; document.getElementById("p").value="";
}

document.addEventListener("keydown", e=>{
  if(e.key==="Enter" && !document.getElementById("loginView").classList.contains("hidden")) doLogin();
});

/* ============================================================
   FILTRO DE BARBERO (dueño/admin ven a todos)
============================================================ */
function canSeeAll(){ return state.user && state.user.role!=="barbero"; }

function buildBarberFilter(){
  const sel = document.getElementById("barberFilter");
  if(!canSeeAll()){ sel.classList.add("hidden"); return; }
  sel.classList.remove("hidden");
  const prev = sel.value;
  sel.innerHTML = '<option value="ALL">Toda la barbería</option>' +
    state.users.map(u=>`<option value="${u.id}">${u.name} · ${ROLE_LABEL[u.role]}</option>`).join("");
  if(prev) sel.value = prev;
}

function activeScope(){
  if(!canSeeAll()) return state.user.id;
  return document.getElementById("barberFilter").value || "ALL";
}

/* ============================================================
   PERMISOS
============================================================ */
function nameOf(id){ const u=state.users.find(x=>x.id===id); return u?u.name:"—"; }
function userById(id){ return state.users.find(x=>x.id===id); }
function rankOf(role){ return RANK[role]||0; }

function canAssignTo(targetId){
  if(targetId === state.user.id) return true;
  const t = userById(targetId); if(!t) return false;
  return rankOf(state.user.role) > rankOf(t.role);
}
function canEditActivity(a){
  const creatorId = a.assignedBy || a.userId;
  if(creatorId === state.user.id) return true;
  const creator = userById(creatorId);
  if(!creator) return rankOf(state.user.role) >= RANK.dueno;
  return rankOf(state.user.role) > rankOf(creator.role);
}
function canToggle(a){ return a.userId === state.user.id || canEditActivity(a); }
function canManageUser(u){ return state.user.role==="dueno"; }

/* ============================================================
   CALENDARIO
============================================================ */
function buildDOW(){
  document.getElementById("dow").innerHTML = DOW.map(d=>`<div class="dow">${d}</div>`).join("");
}
function changeMonth(d){ state.view.setMonth(state.view.getMonth()+d); render(); }
function goToday(){ state.view = new Date(); render(); }
function ymd(y,m,d){ return `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`; }

function activitiesFor(dateStr){
  const scope = activeScope();
  return state.activities.filter(a => a.date===dateStr && (scope==="ALL" ? true : a.userId===scope))
    .sort((x,y)=> (x.time||"99").localeCompare(y.time||"99"));
}

function render(){
  const y = state.view.getFullYear(), m = state.view.getMonth();
  document.getElementById("monthLabel").textContent = `${MONTHS[m]} ${y}`;
  const first = new Date(y,m,1).getDay();
  const days = new Date(y,m+1,0).getDate();
  const today = new Date(); const todayStr = ymd(today.getFullYear(),today.getMonth(),today.getDate());
  let html = "";
  for(let i=0;i<first;i++) html += '<div class="day empty"></div>';
  for(let d=1; d<=days; d++){
    const ds = ymd(y,m,d);
    const acts = activitiesFor(ds);
    const pending = acts.filter(a=>!a.done).length;
    const pills = acts.slice(0,3).map(a=>{
      const who = activeScope()==="ALL" ? nameOf(a.userId).split(" ")[0]+": " : "";
      const tm = a.time ? `<span class="pill-time">${a.time} </span>` : "";
      return `<div class="pill ${a.done?'done':''}">${tm}${who}${esc(a.title)}</div>`;
    }).join("");
    const more = acts.length>3 ? `<div class="more">+${acts.length-3} más</div>` : "";
    html += `<button class="day ${ds===todayStr?'today':''}" onclick="openDay('${ds}')">
       <span class="num">${d}</span>
       ${pending?`<span class="count">${pending}</span>`:""}
       <div class="pills">${pills}${more}</div>
     </button>`;
  }
  document.getElementById("calendar").innerHTML = html;
}
function esc(s){ return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

/* ============================================================
   MODAL DEL DÍA
============================================================ */
function openDay(ds){
  state.selectedDate = ds;
  const [y,m,d] = ds.split("-").map(Number);
  document.getElementById("dayTitle").textContent = `${d} de ${MONTHS[m-1]}, ${y}`;
  const scope = activeScope();
  const targetId = scope==="ALL" ? state.user.id : scope;
  document.getElementById("dayOwner").textContent = "Agenda de: " + (scope==="ALL" ? state.user.name : nameOf(scope));
  renderTasks();
  const addBox = document.getElementById("addBox");
  if(canAssignTo(targetId)){
    addBox.classList.remove("hidden");
    const lbl = (targetId===state.user.id) ? "Nueva actividad para ti" : "Asignar actividad a " + nameOf(targetId);
    document.getElementById("addLabel").textContent = lbl;
  } else {
    addBox.classList.add("hidden");
  }
  document.getElementById("ntTitle").value="";
  document.getElementById("ntTime").value="";
  document.getElementById("ntNotes").value="";
  document.getElementById("dayModal").classList.remove("hidden");
}
function renderTasks(){
  const ds = state.selectedDate;
  const acts = activitiesFor(ds);
  const list = document.getElementById("taskList");
  if(acts.length===0){ list.innerHTML = '<div class="empty-msg">No hay actividades para este día.</div>'; return; }
  list.innerHTML = acts.map(a=>{
    const creatorId = a.assignedBy || a.userId;
    const editable = canEditActivity(a);
    const togglable = canToggle(a);
    const whoTag = activeScope()==="ALL" ? `<span class="tag barbero" style="margin-left:6px">${esc(nameOf(a.userId))}</span>` : "";
    const assignTag = (creatorId && creatorId!==a.userId)
      ? `<span class="assigned-by">Asignada por ${esc(nameOf(creatorId))}</span>` : "";
    const meta = a.time ? `<div class="t-meta">🕐 ${a.time}</div>` : "";
    const notes = a.notes ? `<div class="t-notes">${esc(a.notes)}</div>` : "";
    const chk = togglable
      ? `<button class="chk" onclick="toggleTask('${a.id}')">${a.done?'✓':''}</button>`
      : `<button class="chk" style="opacity:.4;cursor:default">${a.done?'✓':''}</button>`;
    const del = editable
      ? `<button class="del" onclick="deleteTask('${a.id}')">✕</button>`
      : `<span class="lock" title="Solo quien la asignó puede editarla">🔒</span>`;
    return `<div class="task ${a.done?'done':''} ${editable?'':'locked'}">
      ${chk}
      <div class="body"><div class="t-title">${esc(a.title)}${whoTag}${assignTag}</div>${meta}${notes}</div>
      ${del}
    </div>`;
  }).join("");
}
async function addTask(){
  const title = document.getElementById("ntTitle").value.trim();
  if(!title) return;
  const scope = activeScope();
  const ownerId = (scope==="ALL") ? state.user.id : scope;
  if(!canAssignTo(ownerId)){ alert("No tienes permiso para asignar actividades a esta persona."); return; }
  const newAct = {
    id:"a_"+Date.now()+"_"+Math.random().toString(36).slice(2,6),
    userId: ownerId,
    assignedBy: state.user.id,
    date: state.selectedDate,
    time: document.getElementById("ntTime").value,
    title,
    notes: document.getElementById("ntNotes").value.trim(),
    done:false
  };
  try{
    await dbInsertActivity(newAct);
    state.activities.push(newAct);
    document.getElementById("ntTitle").value="";
    document.getElementById("ntTime").value="";
    document.getElementById("ntNotes").value="";
    renderTasks(); render();
  }catch(e){}
}
async function toggleTask(id){
  const a = state.activities.find(x=>x.id===id); if(!a) return;
  if(!canToggle(a)) return;
  a.done = !a.done;
  await dbUpdateActivity(a);
  renderTasks(); render();
}
async function deleteTask(id){
  const a = state.activities.find(x=>x.id===id); if(!a) return;
  if(!canEditActivity(a)){ alert("Solo quien asignó esta actividad puede eliminarla."); return; }
  state.activities = state.activities.filter(x=>x.id!==id);
  await dbDeleteActivity(id);
  renderTasks(); render();
}

/* ============================================================
   GESTIÓN DE USUARIOS (solo dueño)
============================================================ */
function openUsers(){
  const roleSel = document.getElementById("nuRole");
  roleSel.innerHTML = '<option value="barbero">Barbero</option><option value="administradora">Administradora</option><option value="dueno">Dueño</option>';
  renderUsers();
  document.getElementById("userError").textContent="";
  document.getElementById("usersModal").classList.remove("hidden");
}
function renderUsers(){
  const body = document.getElementById("usersBody");
  body.innerHTML = state.users.map(u=>{
    const manage = canManageUser(u);
    const canDelete = manage && u.id!==state.user.id;
    const canPass = manage || u.id===state.user.id;
    return `<tr>
      <td>${esc(u.name)}</td>
      <td>${esc(u.username)}</td>
      <td><span class="tag ${u.role}">${ROLE_LABEL[u.role]}</span></td>
      <td style="text-align:right">
        ${canPass?`<button class="btn sm ghost" onclick="resetPass('${u.id}')">Clave</button>`:""}
        ${canDelete?`<button class="btn sm danger" style="margin-left:6px" onclick="delUser('${u.id}')">Borrar</button>`:""}
      </td>
    </tr>`;
  }).join("");
}
async function addUser(){
  const name = document.getElementById("nuName").value.trim();
  const user = document.getElementById("nuUser").value.trim();
  const pass = document.getElementById("nuPass").value;
  const role = document.getElementById("nuRole").value;
  const err = document.getElementById("userError");
  if(!name||!user||!pass){ err.textContent="Completa nombre, usuario y contraseña."; return; }
  if(state.users.some(u=>u.username.toLowerCase()===user.toLowerCase())){ err.textContent="Ese usuario ya existe."; return; }
  err.textContent="";
  const newUser = { id:"u_"+Date.now()+"_"+Math.random().toString(36).slice(2,5), name, username:user, password:pass, role };
  try{
    await dbInsertUser(newUser);
    state.users.push(newUser);
    document.getElementById("nuName").value=""; document.getElementById("nuUser").value=""; document.getElementById("nuPass").value="";
    renderUsers(); buildBarberFilter();
  }catch(e){}
}
async function resetPass(id){
  const u = state.users.find(x=>x.id===id); if(!u) return;
  if(!(canManageUser(u) || u.id===state.user.id)){ alert("No tienes permiso."); return; }
  const np = prompt(`Nueva contraseña para ${u.name}:`, "");
  if(np===null || np==="") return;
  u.password = np;
  await dbUpdateUserPassword(id, np);
  alert("Contraseña actualizada.");
}
async function delUser(id){
  const u = state.users.find(x=>x.id===id); if(!u) return;
  if(!canManageUser(u) || u.id===state.user.id){ alert("No tienes permiso."); return; }
  if(!confirm(`¿Borrar a ${u.name}? También se eliminarán sus actividades.`)) return;
  state.users = state.users.filter(x=>x.id!==id);
  state.activities = state.activities.filter(a=>a.userId!==id);
  await dbDeleteUser(id);
  renderUsers(); buildBarberFilter(); render();
}

/* ---------- util ---------- */
function closeModal(id){ document.getElementById(id).classList.add("hidden"); }
document.querySelectorAll(".overlay").forEach(o=>o.addEventListener("click",e=>{ if(e.target===o) o.classList.add("hidden"); }));

init();
</script>
